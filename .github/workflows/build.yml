# ──────────────────────────────────────────────────────────────────────────────
#  NETMAX — Multi-Platform CI/CD
#  Builds: Android (split APK), Windows (installer), Linux x64 (AppImage),
#          macOS ARM64 (Apple Silicon), iOS (IPA — sideload)
# ──────────────────────────────────────────────────────────────────────────────
name: Build NETMAX

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FLUTTER_CHANNEL: stable

# ═══════════════════════════════════════════════════════════════════════════════
jobs:

  # ─── Android ──────────────────────────────────────────────────────────────
  android:
    name: Android (Split APK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Decode Keystore
        run: |
          base64 -d android/release.keystore.b64 > android/app/release.keystore

      - name: Setup signing properties
        run: |
          echo "PLAYTORRIO_KEYSTORE_PATH=release.keystore" >> android/gradle.properties
          echo "PLAYTORRIO_KEYSTORE_PASSWORD=${{ secrets.PLAYTORRIO_KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "PLAYTORRIO_KEY_ALIAS=${{ secrets.PLAYTORRIO_KEY_ALIAS }}" >> android/gradle.properties
          echo "PLAYTORRIO_KEY_PASSWORD=${{ secrets.PLAYTORRIO_KEY_PASSWORD }}" >> android/gradle.properties

      - run: flutter pub get

      - name: Build APK (Split per ABI)
        run: >
          flutter build apk --split-per-abi --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}

      - uses: actions/upload-artifact@v4
        with:
          name: NETMAX-Android-APK
          path: build/app/outputs/flutter-apk/*.apk

  # ─── Windows ──────────────────────────────────────────────────────────────
  windows:
    name:  Windows (Installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - run: flutter pub get
      - run: >
          flutter build windows --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\windows\setup.iss

      - uses: actions/upload-artifact@v4
        with:
          name: NETMAX-Windows-Installer
          path: installer/windows/Output/NETMAX-Windows-Setup.exe

  # ─── Linux x64 ───────────────────────────────────────────────────────────
  linux-x64:
    name:  Linux x64 (AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libmpv-dev libsecret-1-dev libjsoncpp-dev \
            libwebkit2gtk-4.1-dev \
            libfuse2

      - name: Generate Linux platform files
        run: |
          flutter create --platforms=linux .

          # Fix binary name & window title
          sed -i 's/set(BINARY_NAME "play_torrio_native")/set(BINARY_NAME "NETMAX")/' \
            linux/CMakeLists.txt
          sed -i 's/set(APPLICATION_ID "com.example.play_torrio_native")/set(APPLICATION_ID "com.netmax.app")/' \
            linux/CMakeLists.txt
          
          # Fix application name in my_application.cc if it exists
          if [ -f "linux/my_application.cc" ]; then
            sed -i 's/play_torrio_native/NETMAX/g' linux/my_application.cc
          fi

      - run: flutter pub get
      - run: >
          flutter build linux --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}

      - name: Package as AppImage
        run: |
          # Download appimagetool
          curl -fSL "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -o appimagetool
          chmod +x appimagetool

          # Create AppDir from Flutter bundle
          APP=NETMAX.AppDir
          mkdir -p "$APP"
          cp -r build/linux/x64/release/bundle/* "$APP/"
          
          # Create a basic desktop file and icon if they are missing
          if [ -f "assets/icon/icon.png" ]; then
            cp assets/icon/icon.png "$APP/NETMAX.png"
          else
            touch "$APP/NETMAX.png"
          fi
          
          if [ -f "installer/linux/NETMAX.desktop" ]; then
            cp installer/linux/NETMAX.desktop "$APP/"
          else
            cat <<EOF > "$APP/NETMAX.desktop"
          [Desktop Entry]
          Name=NETMAX
          Exec=AppRun
          Icon=NETMAX
          Type=Application
          Categories=Utility;
          EOF
          fi

          # AppRun launcher
          printf '#!/bin/bash\ncd "\$(dirname "\$0")"\nexec ./NETMAX "\$@"\n' \
            > "$APP/AppRun"
          chmod +x "$APP/AppRun"

          # Build the AppImage
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run \
            "$APP" NETMAX-Linux-x86_64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: NETMAX-Linux-x64
          path: NETMAX-Linux-x86_64.AppImage

  # ─── macOS ARM64 (Apple Silicon) ─────────────────────────────────────────
  macos-arm64:
    name:  macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Configure macOS platform files
        run: |
          # Regenerate platform scaffolding only if macos/ folder is missing
          if [ ! -d "macos" ]; then
            flutter create --platforms=macos .
          fi

          # ── Entitlements ──
          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            # Disable sandbox
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.app-sandbox" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.app-sandbox bool false" "$f"

            # Hardened runtime: allow JIT (Flutter engine needs this)
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.cs.allow-jit" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.allow-jit bool true" "$f"

            # Network: client (torrent peer connections + API calls)
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.client" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f"

            # Network: server (libtorrent HTTP stream server)
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.server" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.server bool true" "$f"
          done

          # ── App name ──
          /usr/libexec/PlistBuddy -c "Set :CFBundleName NETMAX" \
            macos/Runner/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string NETMAX" \
            macos/Runner/Info.plist

      - run: flutter pub get
      - run: >
          flutter build macos --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}

      - name: Package as DMG
        run: |
          cd build/macos/Build/Products/Release
          mv play_torrio_native.app NETMAX.app

          # Ad-hoc sign the entire .app bundle (deep) so macOS doesn't kill it on launch.
          # --deep signs all nested frameworks/binaries inside the bundle.
          codesign --sign - --force --deep NETMAX.app
          
          # Create DMG using hdiutil (built into macOS)
          mkdir -p dmg_temp
          cp -R NETMAX.app dmg_temp/
          
          # Create Applications symlink for drag-and-drop install
          ln -s /Applications dmg_temp/Applications
          
          # Create DMG
          hdiutil create -volname "NETMAX" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            ../../../../../NETMAX-macOS-arm64.dmg
          
          # Also create ZIP as backup
          zip -ry ../../../../../NETMAX-macOS-arm64.zip NETMAX.app

      - uses: actions/upload-artifact@v4
        with:
          name: NETMAX-macOS-arm64
          path: |
            NETMAX-macOS-arm64.dmg
            NETMAX-macOS-arm64.zip

  # ─── macOS Intel (x86_64 via Rosetta 2) ─────────────────────────────────
  # GitHub no longer offers Intel macOS runners (macos-13 deprecated).
  # We cross-compile on the ARM64 runner using Rosetta 2 + x64 Flutter SDK.
  macos-intel:
    name:  macOS (Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          architecture: x64

      - name: Configure macOS platform files
        run: |
          if [ ! -d "macos" ]; then
            flutter create --platforms=macos .
          fi

          for f in macos/Runner/DebugProfile.entitlements macos/Runner/Release.entitlements; do
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.app-sandbox" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.app-sandbox bool false" "$f"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.cs.allow-jit" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.cs.allow-jit bool true" "$f"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.client" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.client bool true" "$f"
            /usr/libexec/PlistBuddy -c "Delete :com.apple.security.network.server" "$f" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :com.apple.security.network.server bool true" "$f"
          done

          /usr/libexec/PlistBuddy -c "Set :CFBundleName NETMAX" \
            macos/Runner/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string NETMAX" \
            macos/Runner/Info.plist

      - run: arch -x86_64 flutter pub get
      - run: >
          arch -x86_64 flutter build macos --release
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}

      - name: Package as DMG
        run: |
          cd build/macos/Build/Products/Release
          mv play_torrio_native.app NETMAX.app

          codesign --sign - --force --deep NETMAX.app

          mkdir -p dmg_temp
          cp -R NETMAX.app dmg_temp/
          ln -s /Applications dmg_temp/Applications

          hdiutil create -volname "NETMAX" \
            -srcfolder dmg_temp \
            -ov -format UDZO \
            ../../../../../NETMAX-macOS-intel.dmg

          zip -ry ../../../../../NETMAX-macOS-intel.zip NETMAX.app

      - uses: actions/upload-artifact@v4
        with:
          name: NETMAX-macOS-intel
          path: |
            NETMAX-macOS-intel.dmg
            NETMAX-macOS-intel.zip

  # ─── iOS (Sideloadable IPA — no signing) ─────────────────────────────────
  ios:
    name:  iOS (IPA)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}

      - name: Generate iOS platform files
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

          # ── Set bundle ID & display name ──
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.netmax.app" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string com.netmax.app" \
            ios/Runner/Info.plist

          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName NETMAX" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string NETMAX" \
            ios/Runner/Info.plist

          /usr/libexec/PlistBuddy -c "Set :CFBundleName NETMAX" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleName string NETMAX" \
            ios/Runner/Info.plist

          # ── Allow localhost networking (libtorrent local HTTP server) ──
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" \
            ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :NSAppTransportSecurity:NSAllowsLocalNetworking true" \
            ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsLocalNetworking bool true" \
            ios/Runner/Info.plist

          # ── Network entitlements for libtorrent_flutter ──
          cat > ios/Runner/Runner.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>com.apple.security.network.client</key>
          	<true/>
          </dict>
          </plist>
          EOF

      - run: flutter pub get

      # ── Release build ────────────────────────────────────────────────────
      - run: >
          flutter build ios --release --no-codesign
          --dart-define=TRAKT_CLIENT_ID=${{ secrets.TRAKT_CLIENT_ID }}
          --dart-define=TRAKT_CLIENT_SECRET=${{ secrets.TRAKT_CLIENT_SECRET }}
          --dart-define=SIMKL_CLIENT_ID=${{ secrets.SIMKL_CLIENT_ID }}
          --dart-define=SIMKL_CLIENT_SECRET=${{ secrets.SIMKL_CLIENT_SECRET }}

      - name: Package as IPA
        run: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -ry ../../../NETMAX-iOS.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: NETMAX-iOS
          path: NETMAX-iOS.ipa

  # ─── Create GitHub Release ───────────────────────────────────────────────
  release:
    name:  Create Release
    needs: [android, windows, linux-x64, macos-arm64, macos-intel, ios]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            NETMAX-Android-APK/*.apk
            NETMAX-Windows-Installer/*.exe
            NETMAX-Linux-x64/*.AppImage
            NETMAX-macOS-arm64/*.dmg
            NETMAX-macOS-arm64/*.zip
            NETMAX-macOS-intel/*.dmg
            NETMAX-macOS-intel/*.zip
            NETMAX-iOS/*.ipa
